<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="//netdna.bootstrapcdn.com/font-awesome/3.2.1/css/font-awesome.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Dear Diary</title>
    <link rel="icon" type="image/svg+xml" href="../../v1/favicon.svg">
</head>

<body>

    <!-- Load configuration from .env -->
    <script src="config.js"></script>

    <div class="diary-header">
        <div class="container-fluid p-5">
            <h1 class="diary-title">📔 Dear Diary</h1>
            <p class="diary-subtitle">How was today?</p>
        </div>
    </div>

    <div class="container mt-5">

        <ul class="nav nav-tabs justify-content-center custom-tabs" id="diaryTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="entry-tab" data-bs-toggle="tab" data-bs-target="#entry" type="button"
                    role="tab" aria-controls="entry" aria-selected="true">📝 New Entry</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="view-tab" data-bs-toggle="tab" data-bs-target="#view" type="button"
                    role="tab" aria-controls="view" aria-selected="false">📚 Entries</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="calendar-tab" data-bs-toggle="tab" data-bs-target="#calendar" type="button"
                    role="tab" aria-controls="calendar" aria-selected="false">📅 Calendar</button>
            </li>
        </ul>

        <div class="tab-content" id="diaryTabContent">
            
            <!-- New Entry Tab -->
            <div class="tab-pane fade show active" id="entry" role="tabpanel" aria-labelledby="entry-tab">
                <div class="entry-section">
                    <div class="container-fluid p-5 my-5">
                        
                        <div class="alert alert-success hide" id="successBlock">
                            <div class="alert-heading" id="successmsg1">Success!</div>
                            <div id="successmsg2">Your entry has been saved.</div>
                        </div>

                        <form class="was-validated" id="diary-form" enctype="multipart/form-data" method="post">

                            <!-- Date -->
                            <div class="form-group mb-4">
                                <label for="entryDate" class="form-label fw-bold">📅 Date</label>
                                <input type="date" class="form-control form-control-lg" id="entryDate" name="date" required>
                                <div class="valid-feedback">Good to go!</div>
                            </div>

                            <!-- Mood Rating -->
                            <div class="form-group mb-4">
                                <label class="form-label fw-bold">😊 How was your day?</label>
                                <div class="mood-selector">
                                    <div class="mood-options">
                                        <button type="button" class="mood-btn" data-mood="1" title="Terrible">😞</button>
                                        <button type="button" class="mood-btn" data-mood="2" title="Bad">😕</button>
                                        <button type="button" class="mood-btn" data-mood="3" title="Okay">😐</button>
                                        <button type="button" class="mood-btn" data-mood="4" title="Good">🙂</button>
                                        <button type="button" class="mood-btn" data-mood="5" title="Excellent">😄</button>
                                    </div>
                                    <input type="hidden" id="moodRating" name="mood" value="3" required>
                                    <div class="mood-label text-center mt-2" id="moodLabel">Okay</div>
                                </div>
                            </div>

                            <!-- Title -->
                            <div class="form-group mb-4">
                                <label for="entryTitle" class="form-label fw-bold">✨ Title (optional)</label>
                                <input type="text" class="form-control form-control-lg" id="entryTitle" name="title" placeholder="Give your entry a title...">
                            </div>

                            <!-- Message/Entry -->
                            <div class="form-group mb-4">
                                <label for="entryMessage" class="form-label fw-bold">💭 What's on your mind?</label>
                                <textarea class="form-control form-control-lg" id="entryMessage" name="message" rows="8" placeholder="Write what happened today, your thoughts, feelings, goals..." required></textarea>
                                <div class="valid-feedback">Message is required!</div>
                                <small class="text-muted d-block mt-2"><span id="charCount">0</span>/500 characters</small>
                            </div>

                            <!-- Tags -->
                            <div class="form-group mb-4">
                                <label for="entryTags" class="form-label fw-bold">🏷️ Tags (optional)</label>
                                <input type="text" class="form-control form-control-lg" id="entryTags" name="tags" placeholder="e.g., work, family, health (comma separated)">
                            </div>

                            <!-- Submit -->
                            <div class="text-center">
                                <button type="submit" class="btn btn-lg btn-diary" id="submitBtn">Save Entry</button>
                                <button type="reset" class="btn btn-lg btn-outline-secondary ms-2" id="resetBtn">Clear</button>
                                <div id="loader" class="loader hide mt-3">
                                    <div class="spinner-border text-primary" role="status">
                                        <span class="visually-hidden">Loading...</span>
                                    </div>
                                </div>
                            </div>

                        </form>

                    </div>
                </div>
            </div>

            <!-- View Entries Tab -->
            <div class="tab-pane fade" id="view" role="tabpanel" aria-labelledby="view-tab">
                <div class="entries-section">
                    <div class="container-fluid p-5 my-3">
                        <div class="search-box mb-4">
                            <input type="text" class="form-control form-control-lg" id="searchBox" placeholder="🔍 Search entries...">
                        </div>
                        <div id="entriesList" class="entries-list">
                            <p class="text-muted text-center">No entries yet. Create your first entry! 📝</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Calendar Tab -->
            <div class="tab-pane fade" id="calendar" role="tabpanel" aria-labelledby="calendar-tab">
                <div class="calendar-section">
                    <div class="container-fluid p-5 my-3">
                        <div class="calendar-controls mb-4">
                            <button class="btn btn-sm btn-outline-primary" id="prevMonth">&lt; Prev</button>
                            <span id="monthYear" class="mx-3 fw-bold"></span>
                            <button class="btn btn-sm btn-outline-primary" id="nextMonth">Next &gt;</button>
                        </div>
                        <div id="calendar" class="calendar-grid"></div>
                    </div>
                </div>
            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>

</body>

</html>
